<!DOCTYPE html>
<html>
<head><title>Verify Registration</title></head>
<body>
    <form>
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Name" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" required>

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone">

        <label for="college">College/University</label>
        <input type="text" id="college">

        <label for="degree">Degree</label>
        <input type="text" id="degree">

        <label for="branch">Branch of Study</label>
        <input type="text" id="branch">

        <label for="grad">Graduation Year</label>
        <input type="number" id="grad">

        <label for="github">GitHub Link</label>
        <input type="url" id="github">

        <label for="linkedin">LinkedIn URL</label>
        <input type="url" id="linkedin">

        <label for="portfolio">Portfolio</label>
        <input type="url" id="portfolio">

        <label for="resume">Resume PDF</label>
        <input type="file" id="resume">

        <label for="team_name">Team Name</label>
        <input type="text" id="team_name">

        <label for="q1">Why do you want to join this hackathon?</label>
        <textarea id="q1"></textarea>

        <label for="q2">Describe your project idea in detail</label>
        <textarea id="q2"></textarea>
    </form>
</body>
</html>
